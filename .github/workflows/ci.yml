name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (no external API calls)
        run: |
          pytest tests/ -v --tb=short \
            -k "not (ForecastAPI or HistoricalAPI or AirQualityAPI or MarineAPI or ElevationAPI or ModelSpecificAPI)" \
            -k "not (ForecastTools or HistoricalTools or AirQualityTools or MarineTools or EnsembleTools or SpecializedTools)" \
            -k "not (GeocodingAPI or GeocodingTools)"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Check formatting with black
        run: |
          black --check src/ tests/

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
