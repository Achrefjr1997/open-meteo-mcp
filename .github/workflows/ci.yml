name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Check formatting with black
        run: |
          black --check src/ tests/

      - name: Type check with mypy
        run: |
          mypy src/ || echo "mypy check completed with notes"

      - name: Run unit tests (no API calls)
        run: |
          pytest tests/ -v \
            -k "not (test_get_current_weather or test_get_hourly_forecast or test_get_daily_forecast or test_get_15min_forecast or test_get_complete_forecast)" \
            -k "not (test_get_historical or test_get_air_quality or test_get_marine or test_get_elevation or test_get_climate or test_get_ensemble)" \
            -k "not (test_search_location or test_get_location)" \
            --tb=short

      - name: Run all tests (with API calls) - allow failures
        run: |
          pytest tests/ -v --tb=short || true
        continue-on-error: true

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
